<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO SKRU | PRO EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --card-bg: #1a1a1a; --gold: #ffd700; }
        body { background: radial-gradient(circle, #0f172a 0%, #020617 100%); color: white; font-family: 'Cairo', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* الموسيقى والتحكم */
        .audio-controls { position: absolute; top: 10px; right: 10px; z-index: 100; }
        
        /* طاولة اللعب */
        .game-board { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; }

        /* تصميم الكارت الاحترافي */
        .card { 
            width: 75px; height: 110px; perspective: 1000px; cursor: pointer; 
            margin: 5px; transition: transform 0.6s;
        }
        .card-inner { 
            position: relative; width: 100%; height: 100%; text-align: center; 
            transition: transform 0.6s; transform-style: preserve-3d; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        /* ضهر الكارت (KIVENIOO) */
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 12px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center;
        }
        .card-front { 
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%); 
            color: var(--neon); font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 900; 
            letter-spacing: 1px; border: 2px solid var(--gold);
        }
        /* وش الكارت */
        .card-back { 
            background: white; color: black; transform: rotateY(180deg); 
            font-size: 2.5rem; font-family: 'Orbitron'; font-weight: 900;
        }

        /* الكومة اللي في النص */
        .center-piles { display: flex; gap: 20px; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px dashed var(--neon); }
        .deck-pile { background: var(--gold) !important; color: black !important; font-weight: 900; }

        /* الأكشنز */
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { background: var(--glitch); border: none; color: white; padding: 10px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px var(--glitch); }

        /* أنيميشن */
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 20px var(--neon); } 100% { box-shadow: 0 0 5px var(--neon); } }
        .current-turn { animation: glow 1.5s infinite; }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    <audio id="flip-sfx"><source src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" type="audio/mpeg"></audio>

    <div class="game-board">
        <div id="ai-area" style="transform: rotate(180deg);">
            <div style="font-size: 0.8rem; color: #777; margin-bottom: 5px;">AI BOT</div>
            <div id="ai-cards" style="display: flex;">
                <div class="card"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
                <div class="card"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
                <div class="card"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
                <div class="card"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            </div>
        </div>

        <div class="center-piles">
            <div class="card deck-pile" onclick="drawCard()">
                <div style="text-align: center; font-size: 0.8rem;">اسحب<br>DRAW</div>
            </div>
            <div class="card" id="discard-pile" style="border-color: var(--glitch);">
                <div class="card-inner" style="transform: rotateY(180deg);">
                    <div class="card-back" id="discard-val" style="display: flex;">5</div>
                </div>
            </div>
        </div>

        <div id="player-area">
            <div id="status" style="text-align: center; font-size: 0.9rem; color: var(--neon); margin-bottom: 10px;">دورك يا وحش!</div>
            <div id="player-cards" style="display: flex;" class="current-turn">
                <div class="card" onclick="playTurn(0)" id="p-c0"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
                <div class="card" onclick="playTurn(1)" id="p-c1"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
                <div class="card" onclick="playTurn(2)" id="p-c2"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
                <div class="card" onclick="playTurn(3)" id="p-c3"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            </div>
            <div class="action-btns">
                <button class="btn-action" onclick="saySkru()">SKRU!</button>
                <button class="btn-action" style="background:#444; box-shadow:none;" onclick="location.reload()">RESTART</button>
            </div>
        </div>
    </div>

<script>
    let pCards = [0,0,0,0].map(() => Math.floor(Math.random() * 11));
    let aiCards = [0,0,0,0].map(() => Math.floor(Math.random() * 11));
    let drawnValue = null;
    let musicPlaying = false;

    function playMusic() {
        if (!musicPlaying) {
            let m = document.getElementById('bg-music');
            m.volume = 0.2;
            m.play();
            musicPlaying = true;
        }
    }

    function drawCard() {
        if (drawnValue !== null) return;
        document.getElementById('flip-sfx').play();
        drawnValue = Math.floor(Math.random() * 11);
        document.getElementById('status').innerText = `سحبت ${drawnValue}! بدله بكارت من بتوعك`;
    }

    function playTurn(idx) {
        if (drawnValue === null) {
            // حركة "البص" لو مداسش سحب
            const card = document.getElementById(`p-c${idx}`);
            document.getElementById('flip-sfx').play();
            card.querySelector('.card-back').innerText = pCards[idx];
            card.classList.add('flipped');
            setTimeout(() => card.classList.remove('flipped'), 1500);
            return;
        }

        // تبديل
        let old = pCards[idx];
        pCards[idx] = drawnValue;
        document.getElementById('discard-val').innerText = old;
        drawnValue = null;
        document.getElementById('status').innerText = "تم التبديل! دور البوت...";
        setTimeout(aiTurn, 1000);
    }

    function aiTurn() {
        let aiDrawn = Math.floor(Math.random() * 11);
        let maxIdx = aiCards.indexOf(Math.max(...aiCards));
        if (aiDrawn < aiCards[maxIdx]) {
            let old = aiCards[maxIdx];
            aiCards[maxIdx] = aiDrawn;
            document.getElementById('discard-val').innerText = old;
        }
        document.getElementById('status').innerText = "البوت لعب! دورك تاني";
    }

    function saySkru() {
        document.querySelectorAll('.card').forEach((c, i) => {
            let val = i < 4 ? aiCards[i] : pCards[i-4];
            c.querySelector('.card-back').innerText = val;
            c.classList.add('flipped');
        });
        let pSum = pCards.reduce((a,b) => a+b, 0);
        let aiSum = aiCards.reduce((a,b) => a+b, 0);
        setTimeout(() => {
            alert(`النتيجة:\nأنت: ${pSum}\nالبوت: ${aiSum}\n${pSum <= aiSum ? 'مبروك كسبت!' : 'حظ أوفر، البوت غلبك!'}`);
        }, 1000);
    }
</script>
</body>
</html>
