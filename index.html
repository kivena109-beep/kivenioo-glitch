<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO SKRU | PRO MAX</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle, #1a1a1a 0%, #000 100%); }

        /* شاشة جليتش ضخمة */
        .screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 95%; max-width: 500px; }
        .screen.active { display: flex; animation: glitch-vibe 0.3s infinite alternate; }
        @keyframes glitch-vibe { 0% { text-shadow: 2px 0 var(--glitch); transform: skewX(1deg); } 100% { text-shadow: -2px 0 var(--neon); transform: skewX(-1deg); } }

        .logo { font-family: 'Orbitron'; font-size: 4rem; color: var(--neon); text-shadow: 4px 4px var(--glitch); margin-bottom: 20px; }
        
        /* أوبشنز ضخمة */
        .btn-opt { 
            background: rgba(0, 255, 204, 0.05); border: 3px solid var(--neon); color: var(--neon); 
            padding: 20px 50px; margin: 12px; border-radius: 15px; cursor: pointer; 
            font-size: 1.4rem; font-weight: 900; width: 100%; transition: 0.3s; 
        }
        .btn-opt:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); transform: scale(1.05); }

        /* السوشيال ميديا كبيرة */
        .social { display: flex; gap: 40px; margin-top: 40px; font-size: 2.5rem; }
        .social a { color: white; transition: 0.3s; }
        .social a:hover { color: var(--glitch); transform: scale(1.2); }

        /* الطاولة المستديرة */
        .game-board { position: relative; width: 100vw; height: 100vh; display: none; overflow: hidden; }
        .game-board.active { display: block; }

        /* كروت عملاقة */
        .card { width: 95px; height: 140px; perspective: 1000px; cursor: pointer; position: absolute; transition: 0.5s; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 3px solid var(--neon); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.8); }
        
        /* ضهر KIVENIOO واضح جداً */
        .card-front { background: #000; color: var(--neon); font-family: 'Orbitron'; font-size: 0.8rem; text-align: center; font-weight: 900; }
        .card-back { background: #fff; color: #000; transform: rotateY(180deg); font-size: 3.5rem; font-family: 'Orbitron'; font-weight: 900; }

        /* توزيع اللاعبين (لحد 5) */
        .slot { position: absolute; display: flex; gap: 8px; }
        .s0 { bottom: 30px; left: 50%; transform: translateX(-50%); } /* أنت (تحت) */
        .s1 { top: 30px; left: 50%; transform: translateX(-50%) rotate(180deg); } /* خصم (فوق) */
        .s2 { left: 30px; top: 40%; transform: rotate(90deg); }
        .s3 { right: 30px; top: 40%; transform: rotate(-90deg); }
        .s4 { left: 20%; top: 15%; transform: rotate(45deg); } /* لاعب خامس */

        /* منطقة النص الكومة */
        .center-pile { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 20px; z-index: 50; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px dashed var(--neon); }
        
        /* ظهور الرقم المسحوب */
        #drawn-display { 
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            background: var(--glitch); color: white; padding: 5px 15px; border-radius: 10px;
            font-family: 'Orbitron'; font-weight: 900; display: none; box-shadow: 0 0 15px var(--glitch);
        }

        .active-p { filter: drop-shadow(0 0 20px var(--neon)); opacity: 1 !important; transform: scale(1.05); }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <div class="screen active" id="menu">
        <div class="logo">KIVENIOO</div>
        <p style="color: #888; margin-bottom: 20px;">CHOOSE GAME MODE</p>
        <div style="width:100%">
            <button class="btn-opt" onclick="startGame(1)">👤 ضد الروبوت (AI)</button>
            <button class="btn-opt" onclick="startGame(2)">👥 2 لاعيبة</button>
            <button class="btn-opt" onclick="startGame(3)">👨‍👩‍👦 3 لاعيبة</button>
            <button class="btn-opt" onclick="startGame(4)">👨‍👩‍👧‍👦 4 لاعيبة</button>
            <button class="btn-opt" onclick="startGame(5)">👨‍👩‍👧‍👦+1 5 لاعيبة</button>
        </div>
        
        <div class="social">
            <a href="https://www.youtube.com/@kivenioo" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/kivenioo" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="game-board" id="board">
        <div class="center-pile">
            <div id="drawn-display">سحبت: <span id="drawn-val-text">0</span></div>
            <div class="card" onclick="drawFromDeck()" style="border-color: gold; position:relative;"><div class="card-inner"><div class="card-front" style="color:gold">DECK<br>سحب</div></div></div>
            <div class="card flipped" style="position:relative;"><div class="card-inner"><div class="card-back" id="discard-val">5</div></div></div>
        </div>
        <div id="players-wrapper"></div>
        <button onclick="handleSkru()" style="position:absolute; bottom:160px; left:50%; transform:translateX(-50%); background:var(--glitch); border:none; color:white; padding:10px 20px; border-radius:20px; font-weight:900;">SKRU!</button>
    </div>

<script>
    let players = [];
    let turn = 0;
    let drawn = null;
    let isAI = false;
    let musicStarted = false;

    function playMusic() { if(!musicStarted){ let m=document.getElementById('bg-music'); m.volume=0.2; m.play(); musicStarted=true; }}

    function startGame(num) {
        isAI = (num === 1);
        let count = isAI ? 2 : num;
        players = [];
        document.getElementById('players-wrapper').innerHTML = '';
        
        for(let i=0; i<count; i++) {
            players.push({ id: i, name: i===0?'أنت':(isAI?'الروبوت':'لاعب '+(i+1)), cards: [0,0,0,0].map(()=>Math.floor(Math.random()*11)) });
            renderPlayer(i, count);
        }
        
        document.getElementById('menu').classList.remove('active');
        document.getElementById('board').classList.add('active');
        updateUI();
    }

    function renderPlayer(id, total) {
        const slot = document.createElement('div');
        slot.className = `slot s${id}`;
        slot.id = `slot-${id}`;
        slot.style.opacity = "0.4"; // الخصم مطفي في الأول
        slot.innerHTML = `<div style="font-size:0.8rem; color:white; font-weight:bold; background:rgba(0,0,0,0.5); padding:2px 10px; border-radius:10px; margin-bottom:5px;">${players[id].name}</div><div style="display:flex;">` + 
            players[id].cards.map((v, ci) => `
                <div class="card" id="p${id}-c${ci}" onclick="cardClick(${id}, ${ci})" style="position:relative;">
                    <div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">${v}</div></div>
                </div>`).join('') + `</div>`;
        document.getElementById('players-wrapper').appendChild(slot);
    }

    function updateUI() {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-p'));
        document.getElementById(`slot-${turn}`).classList.add('active-p');
        if(isAI && turn === 1) setTimeout(aiPlay, 1500);
    }

    function drawFromDeck() {
        if(drawn !== null || (isAI && turn === 1)) return;
        drawn = Math.floor(Math.random()*11);
        document.getElementById('drawn-val-text').innerText = drawn;
        document.getElementById('drawn-display').style.display = "block";
    }

    function cardClick(pIdx, cIdx) {
        if(pIdx !== turn || (isAI && turn === 1)) return;
        const c = document.getElementById(`p${pIdx}-c${cIdx}`);
        if(drawn === null) {
            c.classList.add('flipped');
            setTimeout(() => c.classList.remove('flipped'), 1500);
        } else {
            let old = players[pIdx].cards[cIdx];
            players[pIdx].cards[cIdx] = drawn;
            c.querySelector('.card-back').innerText = drawn;
            document.getElementById('discard-val').innerText = old;
            document.getElementById('drawn-display').style.display = "none";
            drawn = null;
            turn = (turn + 1) % players.length;
            updateUI();
        }
    }

    function aiPlay() {
        let aiDrawn = Math.floor(Math.random()*11);
        let max = Math.max(...players[1].cards);
        let idx = players[1].cards.indexOf(max);
        if(aiDrawn < max) {
            let old = players[1].cards[idx];
            players[1].cards[idx] = aiDrawn;
            document.getElementById(`p1-c${idx}`).querySelector('.card-back').innerText = aiDrawn;
            document.getElementById('discard-val').innerText = old;
        } else { document.getElementById('discard-val').innerText = aiDrawn; }
        turn = 0;
        updateUI();
    }

    function handleSkru() {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
        let res = players.map(p => `${p.name}: ${p.cards.reduce((a,b)=>a+b,0)}`).join('\n');
        alert("GAME OVER!\n" + res);
    }
</script>
</body>
</html>
