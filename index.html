<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO SPY | THE GHOST PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #050505; --card-bg: #111; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Cairo', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* شاشة البداية مع الخلفية الجديدة وتأثير الجليتش */
        .screen.active#menu {
            display: flex;
            background-image: url('https://i.imgur.com/g0t6M5j.png'); /* رابط الصورة الخلفية */
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1;
        }

        /* تأثير التعتيم على الخلفية لزيادة وضوح العناصر */
        .screen.active#menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* تعتيم بنسبة 70% */
            z-index: -1;
        }

        /* تنسيق اسم KIVENIOO مع الجليتش */
        .logo { 
            font-family: 'Orbitron'; font-size: 3.5rem; color: var(--neon); 
            text-shadow: 3px 3px var(--glitch); margin-bottom: 5px; position: relative;
            animation: textGlitch 1s infinite;
        }

        @keyframes textGlitch {
            0% { text-shadow: 3px 3px var(--glitch); }
            50% { text-shadow: -3px -3px var(--neon); }
            100% { text-shadow: 3px 3px var(--glitch); }
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 90%; max-width: 400px; text-align: center; }
        .screen.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* كارت الدور الاحترافي */
        .role-card {
            width: 300px; height: 420px; perspective: 1000px; cursor: pointer; margin: 20px 0;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .role-card.revealed .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 20px; border: 3px solid var(--neon); display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        .card-front { background: var(--card-bg); color: var(--neon); }
        .card-back { 
            background: #000; color: var(--glitch); transform: rotateY(180deg); 
            border-color: var(--glitch); box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
        }

        /* الأزرار */
        .btn {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 40px; border-radius: 10px; cursor: pointer; font-family: 'Cairo';
            font-weight: 900; font-size: 1.1rem; transition: 0.3s; width: 100%; margin-top: 10px;
        }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        .input-group { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; width: 100%; }
        input { background: transparent; border: none; color: var(--neon); font-family: 'Orbitron'; font-size: 1.5rem; text-align: center; width: 50px; outline: none; }

        #timer { font-family: 'Orbitron'; font-size: 4rem; color: var(--glitch); text-shadow: 0 0 20px var(--glitch); margin: 20px 0; }

        .social { display: flex; gap: 30px; margin-top: 40px; }
        .social a { color: white; font-size: 2rem; transition: 0.3s; }
        .social a:hover { color: var(--neon); transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="screen active" id="menu">
        <div class="logo">KIVENIOO</div>
        <div style="color: #ccc; letter-spacing: 2px; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">THE GHOST PROTOCOL</div>
        
        <div class="input-group">
            <div style="font-size: 0.9rem; color: #aaa; margin-bottom: 10px;">عدد اللاعبين</div>
            <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
                <button onclick="changeCount(-1)" style="background:none; border:none; color:white; font-size:1.5rem;">-</button>
                <input type="number" id="pCount" value="3" readonly>
                <button onclick="changeCount(1)" style="background:none; border:none; color:white; font-size:1.5rem;">+</button>
            </div>
        </div>

        <button class="btn" onclick="startGame()">ابدأ المهمة</button>

        <div class="social">
            <a href="https://www.youtube.com/@kivenioo" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/kivenioo" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="screen" id="role-screen">
        <div id="pLabel" style="font-size: 1.5rem; color: var(--neon); margin-bottom: 10px;">اللاعب رقم 1</div>
        <div class="role-card" id="card-box" onclick="toggleCard()">
            <div class="card-inner">
                <div class="card-front">
                    <i class="fas fa-fingerprint" style="font-size: 5rem; margin-bottom: 20px;"></i>
                    <p>المس للبصمة وكشف الهوية</p>
                </div>
                <div class="card-back">
                    <i class="fas fa-user-secret" style="font-size: 3rem; margin-bottom: 15px;"></i>
                    <div id="role-val" style="font-weight: 900; font-size: 1.8rem;">؟؟؟؟</div>
                </div>
            </div>
        </div>
        <button class="btn" id="next-p-btn" style="visibility:hidden;" onclick="proceedToNext()">اللاعب التالي</button>
    </div>

    <div class="screen" id="game-screen">
        <div class="logo" style="font-size: 2rem;">INVESTIGATION</div>
        <div id="timer">05:00</div>
        <p style="color: #888;">استجوبوا بعضكم.. الجاسوس بينكم!</p>
        <button class="btn" onclick="location.reload()" style="border-color: var(--glitch); color: var(--glitch);">إنهاء التحقيق</button>
    </div>

    <script>
        const places = ["مطار أسيوط", "فرح شعبي", "قسم الشرطة", "تحت الكوبري", "مستشفى المجانين", "مكتب المدير", "قلعة قايتباي", "مترو الأنفاق", "صالة الجيم", "داخل كود البرمجة", "المريخ"];
        let playersCount, spyIdx, currentPlace, currentPlayer = 0;
        let timerInt;

        function changeCount(val) {
            let input = document.getElementById('pCount');
            let newVal = parseInt(input.value) + val;
            if (newVal >= 3 && newVal <= 12) input.value = newVal;
        }

        function startGame() {
            playersCount = parseInt(document.getElementById('pCount').value);
            currentPlace = places[Math.floor(Math.random() * places.length)];
            spyIdx = Math.floor(Math.random() * playersCount);
            currentPlayer = 0;
            showScreen('role-screen');
            loadPlayer();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadPlayer() {
            document.getElementById('pLabel').innerText = `اللاعب رقم ${currentPlayer + 1}`;
            document.getElementById('card-box').classList.remove('revealed');
            document.getElementById('next-p-btn').style.visibility = 'hidden';
            document.getElementById('role-val').innerText = (currentPlayer === spyIdx) ? "أنت الجاسوس 🕵️‍♂️" : currentPlace;
        }

        function toggleCard() {
            document.getElementById('card-box').classList.add('revealed');
            document.getElementById('next-p-btn').style.visibility = 'visible';
        }

        function proceedToNext() {
            currentPlayer++;
            if (currentPlayer < playersCount) {
                loadPlayer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            showScreen('game-screen');
            let time = 300;
            timerInt = setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (time-- <= 0) {
                    clearInterval(timerInt);
                    alert("انتهى الوقت! اكشفوا الجاسوس فوراً!");
                }
            }, 1000);
        }
    </script>
</body>
</html>
