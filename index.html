<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO SKRU | VISIBLE DRAW</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle, #111 0%, #000 100%); }

        .screen { display: none; flex-direction: column; align-items: center; text-align: center; }
        .screen.active { display: flex; }
        .logo { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--neon); text-shadow: 4px 4px var(--glitch); margin-bottom: 20px; }

        .game-board { position: relative; width: 100vw; height: 100vh; display: none; flex-direction: column; justify-content: space-between; padding: 20px 0; }
        .game-board.active { display: flex; }

        .card { width: 85px; height: 125px; perspective: 1000px; cursor: pointer; margin: 5px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 3px solid var(--neon); display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .card-front { background: #000; color: var(--neon); font-family: 'Orbitron'; font-size: 0.7rem; }
        .card-back { background: #fff; color: #000; transform: rotateY(180deg); font-size: 2.8rem; font-family: 'Orbitron'; font-weight: 900; }

        .center-area { display: flex; align-items: center; justify-content: center; gap: 30px; height: 180px; border-top: 1px solid #333; border-bottom: 1px solid #333; position: relative; }
        
        /* الورقة المسحوبة الجديدة */
        #drawn-display { 
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            background: var(--glitch); color: white; padding: 5px 15px; border-radius: 10px;
            font-family: 'Orbitron'; font-weight: 900; display: none; box-shadow: 0 0 15px var(--glitch);
        }

        .active-p { border: 2px solid var(--neon); border-radius: 15px; background: rgba(0,255,204,0.05); box-shadow: 0 0 15px var(--neon); }
        .btn { background: rgba(0,255,204,0.1); border: 2px solid var(--neon); color: var(--neon); padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: 900; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="screen active" id="menu">
        <div class="logo">KIVENIOO</div>
        <button class="btn" onclick="initGame(1)">ضد الروبوت (AI)</button>
        <button class="btn" onclick="initGame(2)">2 لاعيبة</button>
        <button class="btn" onclick="initGame(4)">4 لاعيبة</button>
    </div>

    <div class="game-board" id="board">
        <div id="top-row" style="display:flex; justify-content:center; transform: rotate(180deg);"></div>
        
        <div class="center-area">
            <div id="drawn-display">سحبت: <span id="drawn-val-text">0</span></div>
            
            <div class="card" id="deck" onclick="handleDraw()" style="border-color: gold;"><div class="card-inner"><div class="card-front" style="color:gold">DECK</div></div></div>
            <div class="card flipped"><div class="card-inner"><div class="card-back" id="discard">5</div></div></div>
            
            <div id="status" style="position:absolute; bottom:10px; color:var(--neon); font-size: 0.8rem; font-weight:bold;"></div>
        </div>

        <div id="bottom-row" style="display:flex; justify-content:center;"></div>
        <button onclick="endGame()" style="position:fixed; right:10px; bottom:10px; background:var(--glitch); border:none; color:white; padding:10px 20px; border-radius:20px; font-weight:900;">SKRU!</button>
    </div>

<script>
    let players = [];
    let turn = 0;
    let drawn = null;
    let isAI = false;

    function initGame(num) {
        isAI = (num === 1);
        let count = isAI ? 2 : num;
        players = [];
        document.getElementById('top-row').innerHTML = '';
        document.getElementById('bottom-row').innerHTML = '';
        for(let i=0; i<count; i++) {
            players.push({ id: i, name: i===0?'أنت':(isAI?'الروبوت':'لاعب '+(i+1)), cards: [0,0,0,0].map(()=>Math.floor(Math.random()*11)) });
            renderPlayer(i);
        }
        document.getElementById('menu').classList.remove('active');
        document.getElementById('board').classList.add('active');
        updateUI();
    }

    function renderPlayer(id) {
        const div = document.createElement('div');
        div.id = `player-${id}`;
        div.style.padding = "5px";
        div.innerHTML = `<div style="display:flex">` + players[id].cards.map((v, ci) => `
            <div class="card" id="p${id}-c${ci}" onclick="handleCard(${id}, ${ci})">
                <div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">${v}</div></div>
            </div>`).join('') + `</div>`;
        if(id === 0) document.getElementById('bottom-row').appendChild(div);
        else document.getElementById('top-row').appendChild(div);
    }

    function updateUI() {
        document.querySelectorAll('[id^="player-"]').forEach(el => el.classList.remove('active-p'));
        document.getElementById(`player-${turn}`).classList.add('active-p');
        document.getElementById('status').innerText = "دور: " + players[turn].name;
    }

    function handleDraw() {
        if(drawn !== null || (isAI && turn === 1)) return;
        drawn = Math.floor(Math.random()*11);
        
        // إظهار الرقم المسحوب فوق الكومة بوضوح
        const display = document.getElementById('drawn-display');
        document.getElementById('drawn-val-text').innerText = drawn;
        display.style.display = "block";
        
        document.getElementById('status').innerText = "بدل الرقم بآي كارت عندك";
    }

    function handleCard(pIdx, cIdx) {
        if(pIdx !== turn || (isAI && turn === 1)) return;
        const c = document.getElementById(`p${pIdx}-c${cIdx}`);
        
        if(drawn === null) {
            c.classList.add('flipped');
            setTimeout(() => c.classList.remove('flipped'), 1200);
        } else {
            let old = players[pIdx].cards[cIdx];
            players[pIdx].cards[cIdx] = drawn;
            c.querySelector('.card-back').innerText = drawn;
            document.getElementById('discard').innerText = old;
            
            // إخفاء الرقم المسحوب بعد التبديل
            document.getElementById('drawn-display').style.display = "none";
            drawn = null;
            turn = (turn + 1) % players.length;
            updateUI();
        }
    }

    function endGame() {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
        alert("GAME OVER!");
    }
</script>
</body>
</html>
