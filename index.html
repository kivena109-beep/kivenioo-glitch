<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO SKRU | YOU vs AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: radial-gradient(circle, #111 0%, #000 100%); }

        /* منطقة الخصم (الروبوت) */
        .ai-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotate(180deg); background: rgba(255,0,85,0.02); }
        
        /* منطقة النص (الأرض) */
        .middle-area { height: 160px; display: flex; align-items: center; justify-content: center; gap: 40px; border-top: 1px solid #333; border-bottom: 1px solid #333; position: relative; }

        /* منطقتك أنت */
        .player-area { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,255,204,0.02); }

        /* تصميم الكارت الضخم */
        .card { width: 85px; height: 125px; perspective: 1000px; cursor: pointer; margin: 5px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 3px solid var(--neon); display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        
        .card-front { background: #000; color: var(--neon); font-family: 'Orbitron'; font-size: 0.8rem; text-align: center; }
        .card-back { background: #fff; color: #000; transform: rotateY(180deg); font-size: 2.8rem; font-family: 'Orbitron'; font-weight: 900; }

        .status-msg { position: absolute; left: 10px; color: var(--neon); font-size: 0.9rem; font-weight: bold; }
        .skru-btn { background: var(--glitch); color: white; border: none; padding: 15px; border-radius: 50%; font-weight: 900; cursor: pointer; box-shadow: 0 0 20px var(--glitch); }
        
        .active-turn { box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body onclick="startMusic()">

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <div class="ai-area" id="ai-section">
        <div style="font-size: 1rem; color: var(--glitch); margin-bottom: 10px;">ROBOT AI</div>
        <div style="display: flex;">
            <div class="card" id="ai-c0"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            <div class="card" id="ai-c1"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            <div class="card" id="ai-c2"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            <div class="card" id="ai-c3"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
        </div>
    </div>

    <div class="middle-area">
        <div class="status-msg" id="info">دورك: اسحب أو بص</div>
        <div class="card" onclick="drawFromDeck()" style="border-color: gold;">
            <div class="card-inner"><div class="card-front" style="color:gold">سحب<br>DRAW</div></div>
        </div>
        <div class="card flipped" id="discard-pile">
            <div class="card-inner"><div class="card-back" id="discard-val">5</div></div>
        </div>
        <button class="skru-btn" onclick="saySkru()">SKRU</button>
    </div>

    <div class="player-area" id="player-section">
        <div style="display: flex;">
            <div class="card" id="p-c0" onclick="cardAction(0)"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            <div class="card" id="p-c1" onclick="cardAction(1)"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            <div class="card" id="p-c2" onclick="cardAction(2)"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
            <div class="card" id="p-c3" onclick="cardAction(3)"><div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">?</div></div></div>
        </div>
        <div style="margin-top: 15px; font-size: 1.2rem; color: var(--neon); font-weight: 900;">أنت (YOU)</div>
    </div>

<script>
    let pCards = [0,0,0,0].map(() => Math.floor(Math.random() * 11));
    let aiCards = [0,0,0,0].map(() => Math.floor(Math.random() * 11));
    let turn = 'p'; // p for player, ai for robot
    let drawnVal = null;
    let musicStarted = false;

    function startMusic() { if(!musicStarted) { document.getElementById('bg-music').volume = 0.2; document.getElementById('bg-music').play(); musicStarted = true; } }

    function drawFromDeck() {
        if(turn !== 'p' || drawnVal !== null) return;
        drawnVal = Math.floor(Math.random() * 11);
        document.getElementById('info').innerText = "سحبت: " + drawnVal + " | بدله بكارتك";
    }

    function cardAction(idx) {
        if(turn !== 'p') return;
        const card = document.getElementById(`p-c${idx}`);
        
        if(drawnVal === null) {
            // بصة (Peek)
            card.querySelector('.card-back').innerText = pCards[idx];
            card.classList.add('flipped');
            setTimeout(() => card.classList.remove('flipped'), 1500);
            return;
        }

        // تبديل (Swap)
        let old = pCards[idx];
        pCards[idx] = drawnVal;
        document.getElementById('discard-val').innerText = old;
        card.querySelector('.card-back').innerText = drawnValue; // للتأكد لما يكشف في الآخر
        drawnVal = null;
        turn = 'ai';
        document.getElementById('info').innerText = "الروبوت بيفكر...";
        setTimeout(aiTurn, 1500);
    }

    function aiTurn() {
        let aiDrawn = Math.floor(Math.random() * 11);
        let maxVal = Math.max(...aiCards);
        let maxIdx = aiCards.indexOf(maxVal);

        if(aiDrawn < maxVal) {
            let old = aiCards[maxIdx];
            aiCards[maxIdx] = aiDrawn;
            document.getElementById('discard-val').innerText = old;
        } else {
            document.getElementById('discard-val').innerText = aiDrawn;
        }
        
        turn = 'p';
        document.getElementById('info').innerText = "دورك يا وحش!";
    }

    function saySkru() {
        document.querySelectorAll('.card').forEach((c, i) => {
            if(c.id.startsWith('p-')) c.querySelector('.card-back').innerText = pCards[c.id.split('c')[1]];
            if(c.id.startsWith('ai-')) c.querySelector('.card-back').innerText = aiCards[c.id.split('c')[1]];
            c.classList.add('flipped');
        });
        let pSum = pCards.reduce((a,b)=>a+b, 0);
        let aiSum = aiCards.reduce((a,b)=>a+b, 0);
        setTimeout(() => alert(`النتيجة:\nأنت: ${pSum}\nالروبوت: ${aiSum}\n${pSum <= aiSum ? 'كسبت الروبوت!' : 'الروبوت غلبك!'}`), 1000);
    }
</script>
</body>
</html>
