<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO GLITCH | SKRU PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #050505; --gold: #ffd700; }
        
        /* تأثير الخلفية الجليتش */
        body { 
            background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 85, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* شاشات التنقل */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; text-align: center; animation: glitch-in 0.4s ease; }
        .screen.active { display: flex; }
        @keyframes glitch-in { 0% { transform: skewX(20deg); opacity: 0; } 50% { transform: skewX(-10deg); } 100% { transform: skewX(0); opacity: 1; } }

        .logo { font-family: 'Orbitron'; font-size: 3rem; color: var(--neon); text-shadow: 3px 3px var(--glitch); margin-bottom: 20px; position: relative; }
        .logo::after { content: 'KIVENIOO'; position: absolute; left: 2px; top: 2px; color: var(--glitch); opacity: 0.5; z-index: -1; }

        /* الأزرار الفخمة */
        .btn-menu { 
            background: rgba(0, 255, 204, 0.1); border: 2px solid var(--neon); color: var(--neon); 
            padding: 12px 25px; margin: 8px; border-radius: 5px; cursor: pointer; 
            font-size: 1.1rem; font-weight: 900; width: 80%; transition: 0.3s;
        }
        .btn-menu:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        /* الطاولة والورق */
        .game-board { position: relative; width: 100vw; height: 100vh; display: none; }
        .game-board.active { display: block; }
        
        .card { width: 60px; height: 90px; perspective: 1000px; cursor: pointer; position: absolute; transition: 0.5s; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--neon); }
        
        /* ضهر الورقة باسمك */
        .card-front { background: #000; color: var(--neon); font-family: 'Orbitron'; font-size: 0.6rem; font-weight: 900; text-align: center; line-height: 1; }
        .card-back { background: #fff; color: #000; transform: rotateY(180deg); font-size: 1.8rem; font-weight: 900; }

        /* الكومة اللي في النص */
        .center-pile { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 15px; }

        /* توزيع اللاعبين (لحد 6) */
        .slot { position: absolute; display: flex; gap: 5px; }
        .s0 { bottom: 20px; left: 50%; transform: translateX(-50%); } /* أنت */
        .s1 { top: 20px; left: 50%; transform: translateX(-50%) rotate(180deg); }
        .s2 { left: 20px; top: 30%; transform: rotate(90deg); }
        .s3 { right: 20px; top: 30%; transform: rotate(-90deg); }
        .s4 { left: 20px; bottom: 30%; transform: rotate(90deg); }
        .s5 { right: 20px; bottom: 30%; transform: rotate(-90deg); }

        .settings-icon { position: absolute; top: 15px; left: 15px; font-size: 1.5rem; cursor: pointer; z-index: 200; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

    <div class="settings-icon" onclick="showScreen('menu-screen')">⚙️</div>

    <div class="screen active" id="menu-screen">
        <div class="logo">KIVENIOO</div>
        <p style="color: var(--neon);">اختر عدد اللاعبين</p>
        <button class="btn-menu" onclick="setupGame(1)">1 ضد البوت (AI)</button>
        <button class="btn-menu" onclick="setupGame(2)">2 لاعبين</button>
        <button class="btn-menu" onclick="setupGame(4)">4 لاعبين</button>
        <button class="btn-menu" onclick="setupGame(6)">6 لاعبين</button>
        <button class="btn-menu" onclick="showScreen('settings-screen')" style="border-color: #555; color: #555;">الإعدادات</button>
    </div>

    <div class="screen" id="settings-screen">
        <div class="logo" style="font-size: 2rem;">SETTINGS</div>
        <button class="btn-menu" onclick="toggleMusic()">تشغيل / إيقاف الموسيقى 🎵</button>
        <button class="btn-menu" onclick="alert('اللغة الحالية: العربية')">اللغة: العربية</button>
        <button class="btn-main" onclick="showScreen('menu-screen')" style="color:white;">رجوع</button>
    </div>

    <div id="game-board" class="game-board">
        <div class="center-pile">
            <div class="card" onclick="drawCard()" style="position:relative;"><div class="card-inner"><div class="card-front">DRAW<br>KIVENIOO</div></div></div>
            <div class="card" id="discard-pile" style="position:relative; border-color: var(--glitch);"><div class="card-inner" style="transform: rotateY(180deg);"><div class="card-back" id="discard-val">5</div></div></div>
        </div>
        <div id="players-container"></div>
        <button onclick="endGame()" style="position:absolute; bottom: 120px; left:50%; transform:translateX(-50%); background:var(--glitch); border:none; color:white; padding:10px 20px; border-radius:20px; font-weight:bold;">SKRU!</button>
    </div>

<script>
    let playerCount = 0;
    let playersData = [];
    let drawnValue = null;
    let musicStarted = false;

    function initAudio() { if(!musicStarted) { document.getElementById('bg-music').volume = 0.2; document.getElementById('bg-music').play(); musicStarted = true; } }
    function toggleMusic() { let m = document.getElementById('bg-music'); m.paused ? m.play() : m.pause(); }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('game-board').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    function setupGame(count) {
        playerCount = (count === 1) ? 2 : count;
        const isAI = (count === 1);
        playersData = [];
        document.getElementById('players-container').innerHTML = '';
        
        for(let i=0; i<playerCount; i++) {
            playersData.push({ id: i, cards: [0,0,0,0].map(() => Math.floor(Math.random() * 11)) });
            renderPlayer(i);
        }
        
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-board').classList.add('active');
    }

    function renderPlayer(id) {
        const slot = document.createElement('div');
        slot.className = `slot s${id}`;
        slot.innerHTML = playersData[id].cards.map((val, ci) => `
            <div class="card" id="p${id}-c${ci}" onclick="cardClick(${id}, ${ci})">
                <div class="card-inner">
                    <div class="card-front">KIVENIOO</div>
                    <div class="card-back">${val}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('players-container').appendChild(slot);
    }

    function drawCard() {
        if(drawnValue !== null) return;
        drawnValue = Math.floor(Math.random() * 11);
        alert("سحبت ورقة: " + drawnValue);
    }

    function cardClick(pId, cIdx) {
        if(pId !== 0) { // لو مش دوري (ممكن نبقي نطورها بس حالياً خليها سريعة)
            const card = document.getElementById(`p${pId}-c${cIdx}`);
            card.classList.add('flipped');
            setTimeout(() => card.classList.remove('flipped'), 1500);
            return;
        }
        if(drawnValue === null) return;

        let old = playersData[0].cards[cIdx];
        playersData[0].cards[cIdx] = drawnValue;
        document.getElementById('discard-val').innerText = old;
        document.querySelector(`#p0-c${cIdx} .card-back`).innerText = drawnValue;
        drawnValue = null;
    }

    function endGame() {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
        alert("كشف الورق! شوف النتيجة على الشاشة");
    }
</script>
</body>
</html>
