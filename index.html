<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO SKRU | MASTER EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle, #111 0%, #000 100%); }

        /* شاشة الجليتش الرئيسية */
        .screen { display: none; flex-direction: column; align-items: center; z-index: 100; animation: glitch-anim 0.3s infinite alternate; }
        .screen.active { display: flex; }
        @keyframes glitch-anim { 0% { transform: translate(0); text-shadow: 2px 0 var(--glitch); } 100% { transform: translate(-1px); text-shadow: -2px 0 var(--neon); } }

        .logo { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--neon); text-shadow: 4px 4px var(--glitch); margin-bottom: 10px; }
        
        /* الأزرار */
        .btn-main { background: rgba(0, 255, 204, 0.1); border: 2px solid var(--neon); color: var(--neon); padding: 12px 30px; margin: 8px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: 900; width: 250px; transition: 0.3s; }
        .btn-main:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        /* اللينكات السوشيال */
        .social-links { margin-top: 20px; display: flex; gap: 20px; font-size: 1.8rem; }
        .social-links a { color: white; transition: 0.3s; }
        .social-links a:hover { color: var(--glitch); transform: scale(1.2); }

        /* الطاولة */
        .game-board { position: relative; width: 100vw; height: 100vh; display: none; }
        .game-board.active { display: flex; flex-direction: column; justify-content: space-between; }

        /* الكارت الضخم */
        .card { width: 80px; height: 115px; perspective: 1000px; cursor: pointer; margin: 5px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; }
        
        .card-front { background: #000; color: var(--neon); font-family: 'Orbitron'; font-size: 0.7rem; text-align: center; box-shadow: inset 0 0 10px var(--neon); }
        .card-back { background: #fff; color: #000; transform: rotateY(180deg); font-size: 2.5rem; font-family: 'Orbitron'; font-weight: 900; }

        /* توزيع اللاعبين */
        .p-slot { display: flex; justify-content: center; padding: 10px; transition: 0.3s; }
        .active-turn { background: rgba(0, 255, 204, 0.1); border-radius: 20px; box-shadow: 0 0 20px var(--neon); }

        .center-area { flex: 1; display: flex; align-items: center; justify-content: center; gap: 30px; border-top: 1px solid #333; border-bottom: 1px solid #333; }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

    <div class="screen active" id="menu">
        <div class="logo">KIVENIOO</div>
        <button class="btn-main" onclick="startGame(1)">ضد الروبوت (AI)</button>
        <button class="btn-main" onclick="startGame(2)">2 لاعيبة</button>
        <button class="btn-main" onclick="startGame(3)">3 لاعيبة</button>
        <button class="btn-main" onclick="startGame(4)">4 لاعيبة</button>
        
        <div class="social-links">
            <a href="https://www.youtube.com/@kivenioo" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/kivenioo" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="game-board" id="board">
        <div id="top-players" style="display:flex; justify-content:space-around;"></div>
        
        <div class="center-area">
            <div id="info" style="position:absolute; left:20px; color:var(--neon); font-weight:900;">الدور على: أنت</div>
            <div class="card" onclick="drawFromDeck()" style="border-color:gold"><div class="card-inner"><div class="card-front" style="color:gold">سحب<br>DRAW</div></div></div>
            <div class="card flipped"><div class="card-inner"><div class="card-back" id="discard-val">0</div></div></div>
            <button onclick="handleSkru()" style="background:var(--glitch); border:none; color:white; padding:15px; border-radius:50%; font-weight:900; cursor:pointer;">SKRU</button>
        </div>

        <div id="bottom-players" style="display:flex; justify-content:space-around;"></div>
    </div>

<script>
    let players = [];
    let turn = 0;
    let drawnVal = null;
    let isAI = false;
    let musicStarted = false;

    function playMusic() { if(!musicStarted){ document.getElementById('bg-music').volume=0.2; document.getElementById('bg-music').play(); musicStarted=true; }}

    function startGame(num) {
        isAI = (num === 1);
        let count = isAI ? 2 : num;
        players = [];
        document.getElementById('top-players').innerHTML = '';
        document.getElementById('bottom-players').innerHTML = '';
        
        for(let i=0; i<count; i++) {
            players.push({ id: i, name: i === 0 ? 'أنت' : (isAI ? 'الروبوت' : 'لاعب '+(i+1)), cards: [0,0,0,0].map(()=>Math.floor(Math.random()*11)) });
            renderPlayer(i, count);
        }
        document.getElementById('menu').classList.remove('active');
        document.getElementById('board').classList.add('active');
        updateTurnUI();
    }

    function renderPlayer(id, total) {
        const div = document.createElement('div');
        div.className = `p-slot s${id}`;
        div.id = `slot-${id}`;
        div.innerHTML = `<div style="display:flex">` + players[id].cards.map((v, ci) => `
            <div class="card" id="p${id}-c${ci}" onclick="cardClick(${id}, ${ci})">
                <div class="card-inner"><div class="card-front">KIVENIOO</div><div class="card-back">${v}</div></div>
            </div>`).join('') + `</div>`;
        
        if (id === 0 || (total === 4 && id === 3)) {
            document.getElementById('bottom-players').appendChild(div);
        } else {
            div.style.transform = "rotate(180deg)";
            document.getElementById('top-players').appendChild(div);
        }
    }

    function updateTurnUI() {
        document.querySelectorAll('.p-slot').forEach(s => s.classList.remove('active-turn'));
        document.getElementById(`slot-${turn}`).classList.add('active-turn');
        document.getElementById('info').innerText = "الدور على: " + players[turn].name;
        if(isAI && turn === 1) setTimeout(aiPlay, 1500);
    }

    function drawFromDeck() {
        if(drawnVal !== null || (isAI && turn === 1)) return;
        drawnVal = Math.floor(Math.random()*11);
        alert("سحبت: " + drawnVal);
    }

    function cardClick(pIdx, cIdx) {
        if(pIdx !== turn || (isAI && turn === 1)) return;
        const c = document.getElementById(`p${pIdx}-c${cIdx}`);
        if(drawnVal === null) {
            c.classList.add('flipped');
            setTimeout(() => c.classList.remove('flipped'), 1500);
        } else {
            let old = players[pIdx].cards[cIdx];
            players[pIdx].cards[cIdx] = drawnVal;
            c.querySelector('.card-back').innerText = drawnVal;
            document.getElementById('discard-val').innerText = old;
            drawnVal = null;
            turn = (turn + 1) % players.length;
            updateTurnUI();
        }
    }

    function aiPlay() {
        let aiDrawn = Math.floor(Math.random()*11);
        let max = Math.max(...players[1].cards);
        let idx = players[1].cards.indexOf(max);
        if(aiDrawn < max) {
            let old = players[1].cards[idx];
            players[1].cards[idx] = aiDrawn;
            document.getElementById('discard-val').innerText = old;
        } else {
            document.getElementById('discard-val').innerText = aiDrawn;
        }
        turn = 0;
        updateTurnUI();
    }

    function handleSkru() {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
        let res = players.map(p => `${p.name}: ${p.cards.reduce((a,b)=>a+b,0)}`).join('\n');
        alert("GAME OVER!\n" + res);
    }
</script>
</body>
</html>
