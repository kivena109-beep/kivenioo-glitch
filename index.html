<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO GLITCH | المائدة المستديرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --glitch: #ff0055; --bg: #010409; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* شاشة البداية */
        #setup-screen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-start { background: none; border: 2px solid var(--neon); color: var(--neon); padding: 15px 40px; border-radius: 10px; font-size: 1.5rem; cursor: pointer; font-weight: 900; margin: 10px; }
        
        /* طاولة اللعب */
        .table { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #0a192f 0%, #010409 100%); }

        /* منطقة الورق اللي في النص */
        .center-pile { width: 120px; height: 160px; display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center; z-index: 50; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid #333; }

        /* أماكن اللاعبين */
        .player-slot { position: absolute; display: flex; flex-direction: column; align-items: center; transition: 0.5s; opacity: 0.4; }
        .player-slot.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 10px var(--neon)); }

        .p0 { bottom: 20px; } /* أنت */
        .p1 { left: 10px; top: 50%; transform: translateY(-50%) rotate(90deg); }
        .p2 { top: 20px; transform: rotate(180deg); }
        .p3 { right: 10px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .p4 { bottom: 150px; right: 20px; transform: rotate(-45deg); } /* لاعب خامس */

        .cards-row { display: flex; gap: 5px; }
        .card { width: 50px; height: 75px; background: #111; border: 1px solid var(--neon); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .card .val { display: none; font-family: 'Orbitron'; }
        .card.revealed .val { display: block; }

        .deck { border-style: dashed; background: #000; }
        .discard { border-color: var(--glitch); color: var(--glitch); font-weight: bold; }
        
        #game-info { position: absolute; top: 10px; left: 10px; font-size: 0.8rem; color: var(--neon); }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color:var(--glitch); font-family:'Orbitron';">KIVENIOO GLITCH</h1>
        <p>كم لاعب على الطاولة؟</p>
        <button class="btn-start" onclick="startGame(2)">2 لاعبين</button>
        <button class="btn-start" onclick="startGame(3)">3 لاعبين</button>
        <button class="btn-start" onclick="startGame(4)">4 لاعبين</button>
        <button class="btn-start" onclick="startGame(5)">5 لاعبين</button>
        <button class="btn-start" onclick="startGame(1)" style="border-color: gold; color: gold;">ضد الكمبيوتر (AI)</button>
    </div>

    <div id="game-info">الدور على: <span id="turn-name">-</span></div>

    <div class="table" id="board">
        <div class="center-pile">
            <div class="card deck" onclick="drawFromDeck()">سحب</div>
            <div class="card discard" id="discard-pile"><span id="discard-val">؟</span></div>
            <button onclick="checkSkru()" style="background:var(--glitch); border:none; color:white; border-radius:5px; cursor:pointer;">SKRU</button>
        </div>

        </div>

<script>
    let players = [];
    let currentPlayer = 0;
    let drawnVal = null;
    let isAI = false;

    function startGame(count) {
        document.getElementById('setup-screen').style.display = 'none';
        if (count === 1) { count = 2; isAI = true; } // لاعب ضد كمبيوتر
        
        for (let i = 0; i < count; i++) {
            players.push({
                id: i,
                name: i === 0 ? "أنت" : (isAI ? "AI البوت" : `لاعب ${i+1}`),
                cards: Array.from({length: 4}, () => Math.floor(Math.random() * 11))
            });
            createPlayerUI(i);
        }
        updateTurn();
    }

    function createPlayerUI(id) {
        const slot = document.createElement('div');
        slot.className = `player-slot p${id}`;
        slot.id = `slot-${id}`;
        slot.innerHTML = `
            <div style="font-size:0.7rem; margin-bottom:5px;">${players[id].name}</div>
            <div class="cards-row">
                ${[0,1,2,3].map(j => `<div class="card" id="p${id}-c${j}" onclick="playerAction(${id}, ${j})"><span class="val">${players[id].cards[j]}</span><span class="back">؟</span></div>`).join('')}
            </div>
        `;
        document.getElementById('board').appendChild(slot);
    }

    function updateTurn() {
        document.querySelectorAll('.player-slot').forEach(s => s.classList.remove('active'));
        document.getElementById(`slot-${currentPlayer}`).classList.add('active');
        document.getElementById('turn-name').innerText = players[currentPlayer].name;
        
        if (isAI && currentPlayer === 1) {
            setTimeout(aiMove, 1500);
        }
    }

    function drawFromDeck() {
        if (drawnVal !== null) return;
        drawnVal = Math.floor(Math.random() * 11);
        alert(`${players[currentPlayer].name} سحب ورقة: ${drawnVal}`);
    }

    function playerAction(pId, cIndex) {
        if (pId !== currentPlayer || drawnVal === null) return;
        
        let oldVal = players[pId].cards[cIndex];
        players[pId].cards[cIndex] = drawnVal;
        document.querySelector(`#p${pId}-c${cIndex} .val`).innerText = drawnVal;
        document.getElementById('discard-val').innerText = oldVal;
        
        drawnVal = null;
        nextTurn();
    }

    function nextTurn() {
        currentPlayer = (currentPlayer + 1) % players.length;
        updateTurn();
    }

    function aiMove() {
        // ذكاء اصطناعي بسيط: بيسحب ويبدل أكبر كارت عنده
        drawnVal = Math.floor(Math.random() * 11);
        let maxVal = Math.max(...players[1].cards);
        let maxIdx = players[1].cards.indexOf(maxVal);
        
        if (drawnVal < maxVal) {
            playerAction(1, maxIdx);
        } else {
            document.getElementById('discard-val').innerText = drawnVal;
            drawnVal = null;
            nextTurn();
        }
    }

    function checkSkru() {
        alert("انتهت اللعبة! كشف الحقيقة...");
        document.querySelectorAll('.card').forEach(c => c.classList.add('revealed'));
        let results = players.map(p => `${p.name}: ${p.cards.reduce((a,b)=>a+b,0)}`).join('\n');
        alert(results);
    }
</script>
</body>
</html>
